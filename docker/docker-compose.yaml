name: portflow-nestJs

networks:
  portflow-net:
      driver: bridge

volumes: 
   pg-data:
   mongo-data:
   redis-data:
   
services:
# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
   postgresql:
        container_name: postgres
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: admin
            POSTGRES_EXTRA_DATABASES: >
                    container_service_db
        ports:
          - "5432:5432" 
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d admin"]
            interval: 5s
            timeout: 5s
            retries: 5 
        volumes:
          - pg-data:/var/lib/postgresql/data
          - ./postgres/init:/docker-entrypoint-initdb.d:ro
        networks:
           - portflow-net

# ---------------------------------------------------------------------------
# MongoDB
# ---------------------------------------------------------------------------           
   mongodb:   
         container_name: mongodb 
         image: mongo:8
         environment:
            MONGO_INITDB_ROOT_USERNAME: mongo
            MONGO_INITDB_ROOT_PASSWORD: mongo
            MONGO_INITDB_DATABASE: terminal_service
         ports:
           - "27017:27017"
         healthcheck:
              test: ["CMD", "mongosh", "--username","portflow", "--password", "portflow"]
              interval: 5s
              timeout: 5s
              retries: 10
         volumes:
             - ./mongo/init:/docker-entrypoint-initdb.d
             - mongo-data:/data/db
         networks:
              - portflow-net         
               
# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
   redis:
      container_name: redis
      image: redis:7.4-alpine
      ports:
        - "6379:6379"
      volumes:
        - redis-data:/data
      healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 5s
          timeout: 3s
          retries: 20  


