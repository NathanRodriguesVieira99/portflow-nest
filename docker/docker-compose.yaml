name: portflow-nestJs

networks:
  portflow-net:
      driver: bridge

volumes: 
   container-pg-data:
   
services:
   postgresql:
        container_name: container-service
        image: postgres:18.3-alpine
        environment:
            POSTGRES_USER: container
            POSTGRES_PASSWORD: container
            POSTGRES_DB: container
        ports:
          - "5432:5432" 
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U container -d container"]
            interval: 5s
            timeout: 5s
            retries: 5 
        volumes:
          - container-pg-data:/var/lib/postgresql/data
        networks:
           - portflow-net     
