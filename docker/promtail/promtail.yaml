server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: portflow
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # Label com o nome do container
      - source_labels: ["__meta_docker_container_name"]
        target_label: container

      # Label do service name do compose
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service

    # Pipeline para parsear JSON do Pino
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            correlationId: correlationId
            pid: pid
            hostname: hostname
            time: time

      # Transforma o campo "level" em label para filtrar no Grafana
      - labels:
          level:
          service:

      # Converte o timestamp do Pino (epoch ms) para o formato do Loki
      - timestamp:
          source: time
          format: Unix
