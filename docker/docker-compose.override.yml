services:
  container-service:
    build:
      target: builder
    command: pnpm exec tsx watch src/main.ts
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    volumes:
      # Monta o codigo fonte por cima do que foi copiado no build, permitindo hot-reload sem rebuildar a imagem.
      - ../services/container-service/src:/app/src
      - ../services/container-service/package.json:/app/package.json
