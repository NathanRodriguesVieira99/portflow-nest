services:
  container-service:
    build:
      target: deps
    command: pnpm start:dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      SWC_WATCH_POLLING: "true"
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:admin@postgresql:5432/container_service_db
    volumes:
      - ../services/container-service/src:/app/src
      - ../services/container-service/nest-cli.json:/app/nest-cli.json
      - ../services/container-service/tsconfig.json:/app/tsconfig.json
      - ../services/container-service/tsconfig.build.json:/app/tsconfig.build.json
      - ../services/container-service/.swcrc:/app/.swcrc
