name: Container Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup NodeJs and PNPM
        uses: ./.github/actions/setup-node

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate

      - name: Build Microservice
        run: pnpm build
        working-directory: ./services/container-service

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup NodeJs and PNPM
        uses: ./.github/actions/setup-node

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate

      - name: Lint
        run: pnpm lint
        working-directory: ./services/container-service

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup NodeJs and PNPM
        uses: ./.github/actions/setup-node

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate

      - name: Lint
        run: pnpm typecheck
        working-directory: ./services/container-service

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup NodeJs and PNPM
        uses: ./.github/actions/setup-node

      - name: Generate Prisma Client
        run: pnpm dlx prisma generate

      - name: Unit Tests
        run: pnpm test:unit:cov
        working-directory: ./services/container-service

